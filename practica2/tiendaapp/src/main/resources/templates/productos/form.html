<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <h2 class="mb-4">Formulario de Producto</h2>

    <form th:action="@{/productos}" th:object="${producto}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}">
            <div class="text-danger" th:errors="*{nombre}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" rows="3" th:field="*{descripcion}"></textarea>
            <div class="text-danger" th:errors="*{descripcion}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precio}">
            <div class="text-danger" th:errors="*{precio}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" class="form-control" th:field="*{stock}">
            <div class="text-danger" th:errors="*{stock}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Categoría</label>
            <input type="text" class="form-control" th:field="*{categoria}">
            <div class="text-danger" th:errors="*{categoria}"></div>
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> Guardar
        </button>

        <a th:href="@{/productos}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
